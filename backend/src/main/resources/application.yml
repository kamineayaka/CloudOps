spring:
  application:
    name: cloudops-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  shutdown: graceful
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

cloudops:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-change-in-production-must-be-at-least-256-bits!!}
    access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
    refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost}
  credentials:
    master-key: ${CREDENTIALS_MASTER_KEY:dev-only-master-key-change-in-prod-32bytes!!}
  ai:
    default-provider: ${AI_DEFAULT_PROVIDER:openai-compat}
    openai-compat:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-4o-mini}
      timeout-ms: ${OPENAI_TIMEOUT_MS:60000}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: ${OLLAMA_MODEL:qwen2.5:14b}
      timeout-ms: ${OLLAMA_TIMEOUT_MS:120000}
  rag:
    enabled: ${RAG_ENABLED:true}
    provider: ${RAG_PROVIDER:openai-compat}
    top-k: ${RAG_TOP_K:5}
    min-similarity: ${RAG_MIN_SIMILARITY:0.35}
    chunk-size: ${RAG_CHUNK_SIZE:800}
    chunk-overlap: ${RAG_CHUNK_OVERLAP:100}
    openai-compat:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      api-key: ${OPENAI_API_KEY:}
      model: ${RAG_EMBEDDING_MODEL:text-embedding-3-small}
      dimensions: ${RAG_EMBEDDING_DIMENSIONS:1536}
      timeout-ms: ${RAG_EMBEDDING_TIMEOUT_MS:30000}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: ${RAG_OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
      dimensions: ${RAG_OLLAMA_EMBEDDING_DIMENSIONS:768}
      timeout-ms: ${RAG_EMBEDDING_TIMEOUT_MS:60000}
