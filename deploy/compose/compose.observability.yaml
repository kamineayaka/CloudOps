# Observability stack for CloudOps (optional overlay)
# Usage: docker compose -f deploy/compose/compose.yaml -f deploy/compose/compose.observability.yaml up -d

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: cloudops-prometheus
    restart: unless-stopped
    volumes:
      - ../../docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'

  grafana:
    image: grafana/grafana:11.2.0
    container_name: cloudops-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  loki:
    image: grafana/loki:3.1.1
    container_name: cloudops-loki
    restart: unless-stopped
    volumes:
      - ../../docker/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
