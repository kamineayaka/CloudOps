spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:archops}
    username: ${POSTGRES_USER:archops}
    password: ${POSTGRES_PASSWORD:archops}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

logging:
  level:
    com.archops: DEBUG
    org.springframework.security: INFO
