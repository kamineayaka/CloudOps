spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:archops}
    username: ${POSTGRES_USER:archops}
    password: ${POSTGRES_PASSWORD:archops}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

archops:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost}
  secrets:
    path: ${ARCHOPS_SECRETS_PATH:/data/archops/secrets.properties}
