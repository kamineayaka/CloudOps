# Default values for CloudOps Helm chart.
# Override in values-prod.yaml for production.

global:
  imageRegistry: ""

backend:
  replicaCount: 1
  image:
    repository: cloudops-backend
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi
  env:
    SPRING_PROFILES_ACTIVE: k8s
    AI_DEFAULT_PROVIDER: openai-compat

frontend:
  replicaCount: 1
  image:
    repository: cloudops-frontend
    tag: "0.1.0"
    pullPolicy: IfNotPresent

postgres:
  enabled: true
  storageClass: ""
  storageSize: 10Gi

redis:
  enabled: true

minio:
  enabled: true

ingress:
  enabled: true
  className: nginx
  host: cloudops.example.com
  tls:
    enabled: true
    secretName: cloudops-tls

secrets:
  # Set via --set or external-secrets in production
  jwtSecret: ""
  credentialsMasterKey: ""
  openaiApiKey: ""

observability:
  prometheus:
    enabled: false
  grafana:
    enabled: false
  loki:
    enabled: false
